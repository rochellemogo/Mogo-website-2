<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MOGO Kenya — Finance Your Future. Jenga Kesho.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css"/>

<script>
const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "primaryGreen": "#7AB800",
  "cream": "#F4EFE3",
  "--m-cream": "#FBF7EC",
  "--font-display": "\"Poppins\", sans-serif"
}/*EDITMODE-END*/;
</script>

<!-- Netlify Identity widget — handles invite/confirm email redirects to /admin/ -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on('init', function (user) {
      if (!user) {
        window.netlifyIdentity.on('login', function () {
          document.location.href = '/admin/';
        });
      }
    });
  }
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Core data must load first -->
<script type="text/babel" src="components/data.jsx"></script>

<!-- Navigation -->
<script type="text/babel" src="components/Nav.jsx"></script>

<!-- Hero + partner strip (v2 — "Finance Your Future") -->
<script type="text/babel" src="components/Hero-v2.jsx"></script>

<!-- Mission + persona cards (brand strategy applied) -->
<script type="text/babel" src="components/Mission-v2.jsx"></script>

<!-- Scrolling photo banner -->
<script type="text/babel" src="components/PhotoCarousel.jsx"></script>

<!-- Product grid, How It Works, Impact band -->
<script type="text/babel" src="components/Products.jsx"></script>
<script type="text/babel" src="components/HowItWorks.jsx"></script>

<!-- Customer stories -->
<script type="text/babel" src="components/Stories.jsx"></script>

<!-- Branches map, CTA, Footer, TweaksPanel -->
<script type="text/babel" src="components/Rest.jsx"></script>

<!-- Global apply modal (intercepts every #apply link) -->
<script type="text/babel" src="components/ApplyModal.jsx"></script>

<script type="text/babel">
const App = () => (
  <>
    <Nav/>
    <HeroV2/>
    <InvestorStripV2/>
    <MissionV2/>
    <PhotoCarousel/>
    <Personas/>
    <Products/>
    <HowItWorks/>
    <Impact/>
    <Stories/>
    <Branches/>
    <CTA/>
    <Footer/>
    <ApplyModal/>
    <TweaksPanel/>
  </>
);
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
