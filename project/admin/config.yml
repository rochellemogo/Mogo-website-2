# Decap CMS — MOGO Kenya
# Backend: Netlify Identity + Git Gateway
#
# One-time dashboard setup (done once per site):
#   1. Netlify dashboard → Site settings → Identity → Enable Identity
#   2. Identity → Registration → set to "Invite only"
#   3. Identity → Services → Enable Git Gateway
#   4. Invite editors: Identity → Invite users → enter their email
#   5. They receive an email, set a password, and log in at /admin/

backend:
  name: git-gateway
  branch: main

# Where uploaded images are stored in the repo and served from
media_folder: "project/uploads"
public_folder: "/uploads"

# Collections are ordered to match the website navigation:
# Site Settings → Products → Branches → Stories → News → Careers → FAQ

collections:

  # ─── SITE SETTINGS ────────────────────────────────────────────────────────
  # Homepage hero, mission, how-it-works, impact stats, CTA, footer, partners
  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - name: "homepage"
        label: "Homepage text & settings"
        file: "project/content/settings.json"
        fields:

          - label: "Hero badge text"
            name: "hero_badge"
            widget: "string"
            hint: "Small pill at the top of the hero, e.g. 100,000+ Kenyans backed · 84 branches"

          - label: "Hero headline"
            name: "hero_headline"
            widget: "string"

          - label: "Hero tagline (Swahili line)"
            name: "hero_tagline"
            widget: "string"

          - label: "Hero body text"
            name: "hero_body"
            widget: "text"

          - label: "Hero background photo"
            name: "hero_image"
            widget: "image"
            required: false
            hint: "Optional. Upload a landscape photo. Recommended: 1440×900px."

          - label: "Feature photo (dark editorial banner)"
            name: "feature_image"
            widget: "image"
            required: false
            hint: "Upload a landscape photo for the 'Backing the people who move Kenya' dark banner section. Recommended: 1440×700px."

          - label: "Mission headline"
            name: "mission_headline"
            widget: "string"

          - label: "Mission body"
            name: "mission_body"
            widget: "text"

          - {label: "Pillar 1 title",       name: "mission_point1_title", widget: "string"}
          - {label: "Pillar 1 description", name: "mission_point1_desc",  widget: "text"}
          - {label: "Pillar 2 title",       name: "mission_point2_title", widget: "string"}
          - {label: "Pillar 2 description", name: "mission_point2_desc",  widget: "text"}
          - {label: "Pillar 3 title",       name: "mission_point3_title", widget: "string"}
          - {label: "Pillar 3 description", name: "mission_point3_desc",  widget: "text"}

          - {label: "How It Works headline", name: "how_headline",    widget: "string"}
          - {label: "How It Works subtitle", name: "how_subtitle",    widget: "text"}
          - {label: "Step 1 title",          name: "how_step1_title", widget: "string"}
          - {label: "Step 1 description",    name: "how_step1_desc",  widget: "text"}
          - {label: "Step 2 title",          name: "how_step2_title", widget: "string"}
          - {label: "Step 2 description",    name: "how_step2_desc",  widget: "text"}
          - {label: "Step 3 title",          name: "how_step3_title", widget: "string"}
          - {label: "Step 3 description",    name: "how_step3_desc",  widget: "text"}
          - {label: "Step 4 title",          name: "how_step4_title", widget: "string"}
          - {label: "Step 4 description",    name: "how_step4_desc",  widget: "text"}

          - {label: "Impact headline",        name: "impact_headline",    widget: "string"}
          - {label: "Impact stat 1 (number)", name: "impact_stat1_num",   widget: "string", hint: "e.g. KES 12B+"}
          - {label: "Impact stat 1 (label)",  name: "impact_stat1_label", widget: "string"}
          - {label: "Impact stat 2 (number)", name: "impact_stat2_num",   widget: "string"}
          - {label: "Impact stat 2 (label)",  name: "impact_stat2_label", widget: "string"}
          - {label: "Impact stat 3 (number)", name: "impact_stat3_num",   widget: "string"}
          - {label: "Impact stat 3 (label)",  name: "impact_stat3_label", widget: "string"}

          - {label: "CTA headline",     name: "cta_headline", widget: "string"}
          - {label: "CTA body",         name: "cta_body",     widget: "text"}
          - {label: "CTA phone number", name: "cta_phone",    widget: "string", hint: "e.g. 0709 719 000"}

          - {label: "Footer about text",   name: "footer_about",  widget: "text"}
          - {label: "Footer phone number", name: "footer_phone",  widget: "string"}

          - label: "Partner brands (scrolling strip below hero)"
            name: "partners"
            widget: "list"
            hint: "Brands shown in the scrolling strip. Add or remove as needed."
            field:
              label: "Brand name"
              name: "name"
              widget: "string"

          - label: "Apply form headline"
            name: "form_headline"
            widget: "string"
            hint: "Main headline in the apply pop-up, e.g. Get a call back same day."

          - label: "Apply form subtext"
            name: "form_subtext"
            widget: "text"
            hint: "Description shown below the headline in the apply pop-up."

          - label: "Apply form — success headline"
            name: "form_success_headline"
            widget: "string"
            hint: "Shown after successful submission, e.g. Karibu!"

          - label: "Apply form — success body"
            name: "form_success_body"
            widget: "text"
            hint: "Message shown after submission. Use {name} for first name and {phone} for their number."

          - label: "Field — Full name label"
            name: "form_field_name_label"
            widget: "string"
            default: "Full name"

          - label: "Field — Full name placeholder"
            name: "form_field_name_placeholder"
            widget: "string"
            default: "e.g. Jane Wanjiru"

          - label: "Field — Phone label"
            name: "form_field_phone_label"
            widget: "string"
            default: "Phone number"

          - label: "Field — Phone placeholder"
            name: "form_field_phone_placeholder"
            widget: "string"
            default: "+254 7XX XXX XXX"

          - label: "Field — Email label"
            name: "form_field_email_label"
            widget: "string"
            default: "Email"

          - label: "Field — Email placeholder"
            name: "form_field_email_placeholder"
            widget: "string"
            default: "you@example.com"

          - label: "Field — Address label"
            name: "form_field_address_label"
            widget: "string"
            default: "Address"

          - label: "Field — Address placeholder"
            name: "form_field_address_placeholder"
            widget: "string"
            default: "Estate, town and county"

          - label: "Field — Product dropdown label"
            name: "form_field_product_label"
            widget: "string"
            default: "Product of interest"

          - label: "Field — Product dropdown placeholder"
            name: "form_field_product_placeholder"
            widget: "string"
            default: "— Select a product —"

          - label: "Submit button text"
            name: "form_submit_text"
            widget: "string"
            default: "Submit application"

          - label: "Privacy / consent note"
            name: "form_privacy_text"
            widget: "text"
            default: "By submitting you agree to be contacted by Mogo Auto Ltd. We never share your details."

          - label: "ERP API endpoint URL"
            name: "form_api_endpoint"
            widget: "string"
            required: false
            hint: "URL to POST application data to. Leave blank to show confirmation only (no data forwarded). Must be HTTPS and accept POST with JSON body."

          - label: "ERP API authorization header"
            name: "form_api_key"
            widget: "string"
            required: false
            hint: "Value for the Authorization header, e.g. Bearer your-token. Use a read-limited key — this value is stored in the repository."

          - label: "Impact Report PDF"
            name: "impact_report_url"
            widget: "file"
            required: false
            hint: "Upload the ESG / Impact Report PDF here. Use the 'Choose file' button to upload a new version each year."
            media_folder: "project/uploads"
            public_folder: "/uploads"

  # ─── PRODUCTS ─────────────────────────────────────────────────────────────
  - name: "products"
    label: "🏍️ Products"
    files:
      - name: "product_list"
        label: "All Products"
        file: "project/content/products.json"
        fields:
          - name: "products"
            label: "Products"
            label_singular: "Product"
            widget: "list"
            summary: "{{fields.name}} — {{fields.price}}"
            fields:
              - label: "Slug (URL identifier)"
                name: "slug"
                widget: "string"
                hint: "Must match the HTML filename, e.g. boda-financing. Do not change unless the page file is also renamed."

              - {label: "Full name",     name: "name",       widget: "string", hint: "e.g. Boda Financing"}
              - {label: "Short name",    name: "short",      widget: "string", hint: "Used in navigation"}
              - label: "Category"
                name: "category"
                widget: "select"
                options: ["Vehicles","Logbook","Cash","Devices","Business"]

              - {label: "Tagline",     name: "tagline",    widget: "string"}
              - {label: "Headline",    name: "headline",   widget: "string"}
              - {label: "Description", name: "desc",       widget: "text"}
              - {label: "Badge text",  name: "tag",        widget: "string", hint: "e.g. Most popular"}
              - {label: "Price range", name: "price",      widget: "string", hint: "e.g. From KES 20k down"}
              - {label: "Loan term",   name: "term",       widget: "string", hint: "e.g. 12–24 months"}
              - {label: "Turnaround",  name: "turnaround", widget: "string", hint: "e.g. 2 hours"}

              - label: "Colour theme"
                name: "theme"
                widget: "select"
                options: ["sunset","green","peach","cool","navy","lilac","warm"]

              - label: "Product photo"
                name: "image"
                widget: "image"
                required: false
                hint: "Optional. Upload a photo (portrait 4:5 ratio works best). Leave blank to use the colour gradient."

              - {label: "Mark as featured (shows first on homepage)", name: "featured", widget: "boolean", default: false}
              - {label: "Show 'New' badge",                           name: "isNew",    widget: "boolean", default: false}

              - label: "Price table (optional — e.g. list of bike models)"
                name: "catalogue"
                widget: "object"
                required: false
                collapsed: true
                fields:
                  - {label: "Table title",   name: "title",    widget: "string", hint: "e.g. Available bikes"}
                  - {label: "Table subtitle", name: "subtitle", widget: "text"}
                  - name: "items"
                    label: "Table rows"
                    label_singular: "Row"
                    widget: "list"
                    summary: "{{fields.brand}} — {{fields.down}}"
                    fields:
                      - {label: "Model / Brand",   name: "brand", widget: "string"}
                      - {label: "Spec",            name: "spec",  widget: "string"}
                      - {label: "Down payment",    name: "down",  widget: "string", hint: "e.g. KES 20,000"}
                      - {label: "Daily payment",   name: "daily", widget: "string", hint: "e.g. KES 350"}
                      - {label: "Term",            name: "term",  widget: "string", hint: "e.g. 14 months"}
                      - {label: "Badge (optional)",name: "tag",   widget: "string", required: false}

  # ─── BRANCH LOCATIONS ─────────────────────────────────────────────────────
  - name: "branches"
    label: "📍 Branch Locations"
    files:
      - name: "branch_list"
        label: "All Branches (by region)"
        file: "project/content/branches.json"
        fields:
          - name: "regions"
            label: "Regions"
            label_singular: "Region"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - {label: "Region name",         name: "name",   widget: "string", hint: "e.g. Nairobi Metro"}
              - {label: "Region colour (hex)", name: "colour", widget: "string", hint: "e.g. #7AB800"}
              - name: "branches"
                label: "Branches in this region"
                label_singular: "Branch"
                widget: "list"
                summary: "{{fields.n}} — {{fields.addr}}"
                fields:
                  - {label: "Branch name",    name: "n",    widget: "string", hint: "e.g. Nairobi CBD"}
                  - {label: "Street address", name: "addr", widget: "string", hint: "e.g. Kimathi Street, CBD"}
                  - label: "Latitude"
                    name: "lat"
                    widget: "number"
                    value_type: "float"
                    required: false
                    hint: "Decimal degrees, e.g. -1.2833 (negative = south of equator). Find at maps.google.com → right-click location."
                  - label: "Longitude"
                    name: "lng"
                    widget: "number"
                    value_type: "float"
                    required: false
                    hint: "Decimal degrees, e.g. 36.8172. Find at maps.google.com → right-click location."

  # ─── CUSTOMER STORIES (homepage testimonials) ──────────────────────────────
  - name: "stories"
    label: "💬 Customer Stories"
    files:
      - name: "homepage_stories"
        label: "Homepage testimonial cards"
        file: "project/content/stories.json"
        fields:
          - name: "stories"
            label: "Stories"
            label_singular: "Story"
            widget: "list"
            summary: "{{fields.name}} · {{fields.city}}"
            fields:
              - {label: "Name",          name: "name",    widget: "string"}
              - {label: "City",          name: "city",    widget: "string"}
              - {label: "Role",          name: "role",    widget: "string", hint: "e.g. Boda rider · since 2024"}
              - {label: "Quote",         name: "quote",   widget: "text"}
              - {label: "Product label", name: "product", widget: "string", hint: "e.g. New Boda Loan"}
              - label: "Card colour theme"
                name: "theme"
                widget: "select"
                options: ["sunset","lilac","peach","warm","green","cool","navy"]
              - label: "Photo (optional)"
                name: "photo"
                widget: "image"
                required: false
                hint: "Portrait photo. Leave blank to use the colour card."

  # ─── OUR STORIES VIDEOS ───────────────────────────────────────────────────
  - name: "videos"
    label: "🎬 Our Stories Videos"
    files:
      - name: "our_stories"
        label: "Our Stories page — video list"
        file: "project/content/videos.json"
        fields:
          - name: "stories"
            label: "Videos"
            label_singular: "Video"
            widget: "list"
            summary: "{{fields.name}} · {{fields.city}}"
            hint: "First video is shown as the featured/hero video. The rest appear in the grid below."
            fields:
              - label: "YouTube Video ID"
                name: "youtubeId"
                widget: "string"
                hint: "The ID from the YouTube URL. For youtube.com/watch?v=ABC123, enter ABC123"
              - {label: "Person's name",        name: "name",    widget: "string"}
              - {label: "City",                 name: "city",    widget: "string"}
              - {label: "Role",                 name: "role",    widget: "string", hint: "e.g. Boda rider"}
              - {label: "Product used",         name: "product", widget: "string", hint: "e.g. New Boda Loan"}
              - {label: "Tagline / pull-quote", name: "tagline", widget: "text"}

  # ─── NEWS ARTICLES ────────────────────────────────────────────────────────
  - name: "news"
    label: "📰 News Articles"
    files:
      - name: "articles"
        label: "All Articles"
        file: "project/content/news.json"
        fields:
          - name: "articles"
            label: "Articles"
            label_singular: "Article"
            widget: "list"
            summary: "{{fields.title}} · {{fields.date}}"
            fields:
              - label: "Slug (URL)"
                name: "slug"
                widget: "string"
                hint: "URL identifier — no spaces. e.g. mogo-opens-branch-thika-2026"

              - label: "Category tag"
                name: "tag"
                widget: "select"
                options: ["Partnership","Expansion","Milestone","Impact","Community","Customer story","Product","Group news"]

              - {label: "Short date", name: "date",     widget: "string", hint: "e.g. Apr 2026"}
              - {label: "Full date",  name: "dateLong", widget: "string", hint: "e.g. 18 April 2026"}
              - {label: "Headline",   name: "title",    widget: "string"}

              - label: "Summary (shown in the article list)"
                name: "dek"
                widget: "text"
                hint: "One or two sentences."

              - label: "Photo caption"
                name: "photoLabel"
                widget: "string"
                hint: "Shown on the placeholder image, e.g. Signing ceremony · Nairobi"

              - label: "Photo"
                name: "photo"
                widget: "image"
                required: false
                hint: "Upload a landscape image. Leave blank to use a colour placeholder."

              - label: "Body paragraphs"
                name: "body"
                widget: "list"
                hint: "Add one paragraph per item."
                field:
                  label: "Paragraph"
                  name: "paragraph"
                  widget: "text"

  # ─── CAREERS / JOB LISTINGS ───────────────────────────────────────────────
  - name: "careers"
    label: "💼 Job Listings"
    files:
      - name: "jobs"
        label: "Open Roles"
        file: "project/content/careers.json"
        fields:
          - name: "jobs"
            label: "Open roles"
            label_singular: "Role"
            widget: "list"
            summary: "{{fields.title}} — {{fields.dept}}"
            fields:
              - {label: "Job title",             name: "title", widget: "string", hint: "e.g. Branch Sales Officer"}
              - {label: "Department / location", name: "dept",  widget: "string", hint: "e.g. Retail · Multiple branches"}
              - label: "Employment type"
                name: "type"
                widget: "select"
                options: ["Full-time","Part-time","Contract","Full-time · Shifts","Internship"]

  # ─── PHOTOS & MEDIA ───────────────────────────────────────────────────────
  - name: "media"
    label: "📷 Photos & Media"
    files:
      - name: "site_photos"
        label: "All site photos"
        file: "project/content/media.json"
        fields:
          - name: "carousel"
            label: "Homepage photo strip"
            label_singular: "Photo"
            widget: "list"
            summary: "{{fields.alt}}"
            hint: "The scrolling photo strip shown on the homepage. Add, remove, or drag to reorder."
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                hint: "Landscape photo. Recommended: 800×600 px or larger."
              - label: "Alt text"
                name: "alt"
                widget: "string"
                required: false
                hint: "Brief description of the photo for screen readers."

          - name: "impact_banner"
            label: "Impact page photo strip"
            label_singular: "Photo"
            widget: "list"
            summary: "{{fields.alt}}"
            hint: "The scrolling photo strip on the Our Impact page. Add, remove, or drag to reorder."
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                hint: "Landscape photo. Recommended: 800×600 px or larger."
              - label: "Alt text"
                name: "alt"
                widget: "string"
                required: false
                hint: "Brief description for screen readers."

          - name: "impact_photos"
            label: "Impact pillar photos (Our Impact)"
            label_singular: "Photo"
            widget: "list"
            summary: "{{fields.tag}}"
            hint: "4 photos — one per impact pillar, in order: Financial Literacy, Community Activations, Community Building, CSR."
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                hint: "Portrait photo. Recommended: 600×750 px or larger."
              - label: "Photo caption tag"
                name: "tag"
                widget: "string"
                hint: "Short label shown on the photo, e.g. Chairman training · Nairobi"
              - label: "Alt text"
                name: "alt"
                widget: "string"
                required: false

  # ─── ABOUT US PAGE ────────────────────────────────────────────────────────
  - name: "about"
    label: "🏢 About Us Page"
    files:
      - name: "about_page"
        label: "About Us page content"
        file: "project/content/about.json"
        fields:
          - {label: "Hero eyebrow",   name: "hero_eyebrow", widget: "string", hint: "Small label above the headline, e.g. About us"}
          - {label: "Hero headline",  name: "hero_title",   widget: "string", hint: "Main heading. Use <em>text</em> for italic emphasis."}
          - {label: "Hero kicker",    name: "hero_kicker",  widget: "text",   hint: "One or two sentences below the headline."}
          - {label: "Mission headline", name: "mission_headline", widget: "string", hint: "Use <em>text</em> for italic and <br/> for line breaks."}
          - {label: "Mission body",     name: "mission_body",     widget: "text",   hint: "Separate paragraphs with a blank line."}
          - {label: "Stat 1 — number",  name: "stat1_n",     widget: "string", hint: "e.g. 100K+"}
          - {label: "Stat 1 — label",   name: "stat1_label", widget: "string"}
          - {label: "Stat 2 — number",  name: "stat2_n",     widget: "string"}
          - {label: "Stat 2 — label",   name: "stat2_label", widget: "string"}
          - {label: "Stat 3 — number",  name: "stat3_n",     widget: "string"}
          - {label: "Stat 3 — label",   name: "stat3_label", widget: "string"}
          - {label: "Eleving section headline", name: "eleving_title",  widget: "string", hint: "Use <em>text</em> for italic."}
          - {label: "Eleving body paragraph 1", name: "eleving_body1",  widget: "text"}
          - {label: "Eleving body paragraph 2", name: "eleving_body2",  widget: "text",   required: false}
          - {label: "Award recognition text",   name: "award_text",     widget: "text"}
          - label: "Award badge image"
            name: "award_badge_image"
            widget: "image"
            required: false
            hint: "Optional. Upload the FT award badge or similar."
          - {label: "Countries (comma-separated)", name: "countries", widget: "string", hint: "e.g. Kenya,Uganda,Tanzania,Latvia — displayed as country pills"}
          - {label: "CTA headline",  name: "cta_title",    widget: "string", hint: "Use <em>text</em> for italic."}
          - {label: "CTA subtitle",  name: "cta_subtitle", widget: "string"}

  # ─── IMPACT PAGE ──────────────────────────────────────────────────────────
  - name: "impact"
    label: "🌱 Impact Page"
    files:
      - name: "impact_page"
        label: "Mogo Impact page content"
        file: "project/content/impact.json"
        fields:
          - {label: "Hero eyebrow",   name: "hero_eyebrow", widget: "string"}
          - {label: "Hero headline",  name: "hero_title",   widget: "string", hint: "Use <em>text</em> for italic and <br/> for line breaks."}
          - {label: "Hero kicker",    name: "hero_kicker",  widget: "text"}
          - {label: "Stat 1 — number",  name: "stat1_n",     widget: "string"}
          - {label: "Stat 1 — label",   name: "stat1_label", widget: "string"}
          - {label: "Stat 2 — number",  name: "stat2_n",     widget: "string"}
          - {label: "Stat 2 — label",   name: "stat2_label", widget: "string"}
          - {label: "Stat 3 — number",  name: "stat3_n",     widget: "string"}
          - {label: "Stat 3 — label",   name: "stat3_label", widget: "string"}
          - {label: "Lending headline", name: "lending_headline", widget: "string", hint: "Use <em>text</em> for italic and <br/> for line breaks."}
          - {label: "Lending body",     name: "lending_body",     widget: "text",   hint: "Separate paragraphs with a blank line."}

  # ─── FAQ ──────────────────────────────────────────────────────────────────
  - name: "faq"
    label: "❓ FAQ"
    files:
      - name: "faq_list"
        label: "Frequently Asked Questions"
        file: "project/content/faq.json"
        fields:
          - name: "groups"
            label: "Question groups"
            label_singular: "Group"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "Group heading", name: "title", widget: "string", hint: "e.g. Applying"}
              - name: "questions"
                label: "Questions"
                label_singular: "Question"
                widget: "list"
                summary: "{{fields.q}}"
                fields:
                  - {label: "Question", name: "q", widget: "string"}
                  - {label: "Answer",   name: "a", widget: "text"}
